<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Elements — explore the periodic table and the materials of the real world. A science playground for kids.">
  <meta name="theme-color" content="#0e1230">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Elements">
  <title>Elements — Material Science for Kids</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header" id="app-header">
    <button class="back-btn hidden" id="back-btn" aria-label="Go back">←</button>
    <h1 class="app-title" id="app-title">Elements</h1>
  </header>

  <main id="view" class="view" aria-live="polite"></main>

  <nav class="tabbar" aria-label="Main navigation">
    <a href="#/home" data-tab="home" class="tab"><span class="tab-icon">⚛️</span><span class="tab-label">Explore</span></a>
    <a href="#/compare" data-tab="compare" class="tab"><span class="tab-icon">⚖️</span><span class="tab-label">Compare</span></a>
    <a href="#/play" data-tab="play" class="tab"><span class="tab-icon">🎮</span><span class="tab-label">Play</span></a>
    <a href="#/experiments" data-tab="experiments" class="tab"><span class="tab-icon">🧪</span><span class="tab-label">Lab</span></a>
    <a href="#/badges" data-tab="badges" class="tab"><span class="tab-icon">🏅</span><span class="tab-label">Badges</span></a>
  </nav>

  <div id="confetti-layer" aria-hidden="true"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
